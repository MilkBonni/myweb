<div class="lightbox" id="lightbox">
    <button class="close-lightbox" id="closeLightbox">✕</button>
    <button class="lightbox-prev" id="prevImage">‹</button>
    <button class="lightbox-next" id="nextImage">›</button>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<script>
    // Собираем все скриншоты (элементы с data-img-src)
    const screenshotItems = Array.from(document.querySelectorAll('.screenshot-item'));
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCaption = document.getElementById('lightboxCaption');
    let currentIndex = 0;

    // Функция открытия лайтбокса
    function openLightbox(index) {
        if (index < 0) index = 0;
        if (index >= screenshotItems.length) index = screenshotItems.length - 1;
        currentIndex = index;
        
        const item = screenshotItems[currentIndex];
        const imgSrc = item.getAttribute('data-img-src');
        const caption = item.getAttribute('data-img-caption') || 
                        item.querySelector('.caption')?.innerText || 
                        'Без описания';
        
        lightboxImg.src = imgSrc;
        lightboxCaption.innerText = caption;
        lightbox.classList.add('active');
        document.body.classList.add('modal-open');
    }

    // Закрыть лайтбокс
    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.classList.remove('modal-open');
    }

    // Следующее изображение
    function nextImage() {
        if (currentIndex < screenshotItems.length - 1) {
            openLightbox(currentIndex + 1);
        }
    }

    // Предыдущее изображение
    function prevImage() {
        if (currentIndex > 0) {
            openLightbox(currentIndex - 1);
        }
    }

    // Навешиваем обработчики на каждый скриншот
    screenshotItems.forEach((item, idx) => {
        item.addEventListener('click', (e) => {
            // Не даём клику по картинке всплыть выше
            e.stopPropagation();
            openLightbox(idx);
        });
    });

    // Обработчики для элементов модального окна
    document.getElementById('closeLightbox').addEventListener('click', closeLightbox);
    document.getElementById('nextImage').addEventListener('click', nextImage);
    document.getElementById('prevImage').addEventListener('click', prevImage);
    
    // Клик по фону (оверлею) закрывает
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
            closeLightbox();
        }
    });

    // Клавиатура: ESC закрывает, стрелки навигация
    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        
        if (e.key === 'Escape') {
            closeLightbox();
        } else if (e.key === 'ArrowRight') {
            nextImage();
        } else if (e.key === 'ArrowLeft') {
            prevImage();
        }
    });
</script>
</body>
</html>
