    <style>
        :root {
            --blue: #24aaec;
            --violet: #a033ff;
            --pink: #ff6b9d;
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-secondary: #cccccc;
            --accent: #24aaec;
        }
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, Arial, sans-serif;
        }
        body { position: relative; }

        .nav {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
        }
        
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            margin: 0 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .nav a:hover, .nav a.active {
            color: var(--accent);
        }

        @media (max-width: 640px) {
            .nav {
                top: 15px;
                right: 15px;
                padding: 10px 15px;
            }
            
            .nav a {
                margin: 0 6px;
                font-size: 13px;
            }
        }

        .glass-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(90vw, 450px);
            height: auto;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        h1 { 
            color: white; 
            font-size: clamp(32px, 5vw, 48px); 
            margin: 0 0 10px; 
            font-weight: 300;
        }
        .nickname { 
            color: #ccc; 
            font-size: 18px; 
            margin: 0 0 20px; 
        }
        .slogan { 
            color: #aaa; 
            font-size: 16px; 
            margin: 0 0 30px; 
            opacity: 0.8;
        }
        .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .links a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .links a:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .a-blue:hover {color: var(--blue);}
        .a-violet:hover {color: var(--violet);}
        .a-pink:hover {color: var(--pink);}
        .links i { font-size: 28px; margin-right: 10px; }
        .qr { margin-top: 30px; opacity: 0.7; }
        .qr img { width: 100px; height: 100px; border-radius: 12px; }
        @media (max-width: 600px) {
            .glass-box { padding: 30px 20px; }
            .links { gap: 15px; }
            .links a { padding: 10px 16px; font-size: 13px; }
            .links i { font-size: 24px; }
        }

    <script>
        let vantaEffect = null;
        
        // Инициализация Vanta
        vantaEffect = VANTA.NET({
            el: "#net",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0xffffff,
            backgroundColor: 0x0a0a0a,
            points: 14,
            maxDistance: 18,
            spacing: 16
        });

        // Обработчики hover для ссылок
        document.querySelectorAll('.links a').forEach(link => {
            link.addEventListener('mouseenter', function() {
                const newColor = this.getAttribute('data-netcolor');
                if (vantaEffect && newColor) {
                    vantaEffect.setOptions({ color: parseInt(newColor, 16) });
                }
            });
            
            link.addEventListener('mouseleave', function() {
                if (vantaEffect) {
                    // Возврат к белому
                    vantaEffect.setOptions({ color: 0xffffff });
                }
            });
        });

        // Трекинг кликов — ФИКС для target="_blank"
        document.querySelectorAll('.links a').forEach(link => {
            // Клик с задержкой (браузер успеет отправить)
            link.addEventListener('click', function(e) {
                e.preventDefault(); // Стоп переход
        
                const platform = this.getAttribute('data-platform') || 'unknown';
                console.log('Клик:', platform); // ТЕСТ
        
                // Отправляем событие
                gtag('event', 'link_click', {
                    'event_category': 'outbound',
                    'event_label': platform,
                    'value': 1
                });
        
                // Переходим после 100мс
                setTimeout(() => {
                    window.open(this.href, '_blank');
                }, 100);
            });
        });
    </script>
